name: iOS IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1' # Matching local development version
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # Build the iOS bundle without code signing
      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      # Package the Runner.app into an unsigned .ipa archive for sideloading
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios
          path: app-release.ipa
